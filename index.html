<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>つくまなラボから脱出せよ！</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:#0a0a1a;color:#e0e8f0;min-height:100vh;overflow-x:hidden}

/* Hero */
.hero{text-align:center;padding:60px 20px 40px;background:radial-gradient(ellipse at center,#0d2040 0%,#0a0a1a 70%)}
.hero h1{font-size:clamp(28px,6vw,52px);font-weight:900;color:#0ff;text-shadow:0 0 30px rgba(0,255,255,.4),0 0 60px rgba(0,255,255,.15);letter-spacing:2px;line-height:1.3}
.tc-tu{color:#F9EE52;text-shadow:0 0 20px rgba(249,238,82,.5)}
.tc-ku{color:#589FE2;text-shadow:0 0 20px rgba(88,159,226,.5)}
.tc-ma{color:#4C964A;text-shadow:0 0 20px rgba(76,150,74,.5)}
.tc-na{color:#C9347C;text-shadow:0 0 20px rgba(201,52,124,.5)}
.tc-rest{color:#fff;text-shadow:0 0 20px rgba(255,255,255,.3)}
.hero .subtitle{font-size:clamp(14px,3vw,20px);color:#6ab8cc;margin-top:12px;letter-spacing:1px}
.hero .play-btn{display:inline-block;margin-top:32px;padding:16px 48px;background:linear-gradient(135deg,#00b4d8,#0077aa);color:#fff;font-size:clamp(16px,3.5vw,22px);font-weight:700;border-radius:50px;text-decoration:none;box-shadow:0 4px 20px rgba(0,180,216,.4);transition:transform .2s,box-shadow .2s;letter-spacing:1px}
.hero .play-btn:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(0,180,216,.6)}

/* Thumbnails */
.thumbs{max-width:960px;margin:0 auto;padding:40px 20px}
.thumbs h2{text-align:center;font-size:clamp(18px,4vw,28px);color:#0ff;margin-bottom:24px}
.thumb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.thumb-grid img{width:100%;border-radius:8px;border:2px solid #1a3a5a;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .2s,border-color .2s}
.thumb-grid img:hover{transform:scale(1.03);border-color:#0ff}
.thumb-label{text-align:center;font-size:13px;color:#6ab8cc;margin-top:6px;padding-bottom:4px}

/* QR section */
.qr-section{text-align:center;padding:40px 20px 60px;background:linear-gradient(180deg,transparent,rgba(0,30,50,.5))}
.qr-section h2{font-size:clamp(16px,3.5vw,24px);color:#0ff;margin-bottom:8px}
.qr-section p{color:#6ab8cc;font-size:14px;margin-bottom:20px}
.qr-box{display:inline-block;background:#fff;padding:16px;border-radius:12px;box-shadow:0 4px 20px rgba(0,255,255,.15)}
.qr-box img{display:block}

footer{text-align:center;padding:20px;color:#3a5a6a;font-size:12px}
</style>
</head>
<body>

<div class="hero">
  <h1><span class="tc-tu">つ</span><span class="tc-ku">く</span><span class="tc-ma">ま</span><span class="tc-na">な</span><span class="tc-rest">ラボから脱出せよ！</span></h1>
  <div class="subtitle">Escape from TukumanaLab ― ブラウザで遊べる脱出ゲーム</div>
  <a href="game.html" class="play-btn">▶ ゲームをプレイ</a>
</div>

<div class="thumbs">
  <h2>🖼 ゲーム画面</h2>
  <div class="thumb-grid">
    <div>
      <img src="thumb_intro.png" alt="イントロ画面">
      <div class="thumb-label">タイトル画面</div>
    </div>
    <div>
      <img src="thumb_room.png" alt="メイン室">
      <div class="thumb-label">メイン室 ― ホワイトボードと出口ドア</div>
    </div>
    <div>
      <img src="thumb_cad.png" alt="CAD室">
      <div class="thumb-label">CAD室 ― PCとひらがな表</div>
    </div>
  </div>
</div>

<div class="qr-section">
  <h2>📱 スマホでプレイ</h2>
  <p>QRコードを読み取ってアクセス</p>
  <div class="qr-box" id="qr"></div>
</div>

<footer>&copy; 2025 つくまなラボ</footer>

<script>
// Generate QR code for the game URL
const base = window.location.href.replace(/\/[^/]*$/,'/');
const gameUrl = base + 'game.html';
const qr = qrcode(0, 'M');
qr.addData(gameUrl);
qr.make();
document.getElementById('qr').innerHTML = qr.createImgTag(6, 0);
</script>
</body>
</html>
