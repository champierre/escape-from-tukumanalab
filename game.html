<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>つくまなラボ - 脱出ゲーム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:#0a0a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;min-height:100dvh;overflow:hidden}
#gc{position:relative;border:3px solid #0d2137;box-shadow:0 0 40px rgba(0,255,255,.25),inset 0 0 40px rgba(0,0,0,.5);border-radius:4px;transform-origin:center center}
canvas{display:block;cursor:pointer}
#msg{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,10,20,.95);color:#0ff;padding:14px 28px;border-radius:10px;font-size:clamp(15px,3.5vw,19px);border:1px solid rgba(0,255,255,.35);opacity:0;pointer-events:none;transition:opacity .35s;z-index:50;white-space:normal;word-break:break-word;letter-spacing:.5px;max-width:92%;max-height:calc(100vh - 24px);max-height:calc(100dvh - 24px);overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 4px 20px rgba(0,0,0,.6);text-align:left}#msg.multiline{white-space:pre-line;text-align:left;font-size:clamp(14px,3.2vw,17px);line-height:1.7}
#msg.show{opacity:1;pointer-events:auto}
#msg::-webkit-scrollbar{width:4px}#msg::-webkit-scrollbar-thumb{background:rgba(0,255,255,.3);border-radius:2px}
#size-warn{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(180,60,0,.95);color:#fff;text-align:center;padding:10px 16px;font-size:14px;font-family:'Noto Sans JP',sans-serif;letter-spacing:.3px;line-height:1.5;backdrop-filter:blur(4px)}
#size-warn.show{display:block}
#size-warn span{color:#ff0;font-weight:bold}
</style>
</head>
<body>
<div id="size-warn">⚠ 画面が小さいため、ゲームの一部が表示されていません。<span>ブラウザを拡大</span>するか、<span>全画面表示</span>でお楽しみください。</div>
<div id="gc">
<canvas id="cv" width="1280" height="720"></canvas>
</div>
<div id="msg"></div>
<script>
"use strict";
const W=1280,H=720,INV_H=80;
const ST={INTRO:"intro",ROOM_L:"roomL",ROOM:"room",ROOM_R:"roomR",PASSCODE:"passcode",MODEL:"model",SLICE:"slice",PRINT:"print",FILAMENT:"filament",CHESS:"chess",WIN:"win"};
const G={cv:null,cx:null,st:ST.INTRO,inv:[],sel:null,mx:0,my:0,t:0,msgEl:null,doorAnim:0,introT:0,pcUnlocked:false};

const room={
  door:{x:990,y:120,w:220,h:480,locked:true},
  comp:{x:80,y:280,w:200,h:140},
  prn:{x:580,y:300,w:220,h:200},
  wb:{x:340,y:60,w:280,h:200},
  clock:{x:870,y:60,r:40}
};

const mdl={
  parts:[],selIdx:-1,drag:false,dragOX:0,dragOY:0,
  gs:20,rot:0,
  tpl:{
    head:{label:"キーヘッド",desc:"鍵の頭部分",w:3,h:3,col:"#3da5f5",colD:"#2878b8",colR:"#1e5a8a"},
    shaft:{label:"キーシャフト",desc:"鍵の軸",w:8,h:1.5,col:"#3da5f5",colD:"#2878b8",colR:"#1e5a8a"},
    tooth:{label:"キー歯",desc:"鍵の歯",w:1,h:0.8,col:"#3da5f5",colD:"#2878b8",colR:"#1e5a8a"}
  }
};

const slc={layer:0,total:50,slicing:false,prog:0,done:false,gc:[],support:false};
const prn={on:false,prog:0,layer:0,total:50,hx:50,dir:1,filSet:false,powered:false};
let deskDrawerOpen=false;
const chess={board:null,selR:-1,selC:-1,moved:false};
function initChessBoard(){
  // Smothered mate position: Ng5-f7#
  chess.board=[
    [null,null,null,null,null,null,'r','k'],
    [null,null,null,null,null,null,'p','p'],
    [null,null,null,null,null,null,null,null],
    [null,null,null,null,null,null,'N',null],
    [null,null,null,null,null,null,null,null],
    [null,null,null,null,null,null,null,null],
    [null,null,null,null,null,null,null,null],
    [null,null,null,null,null,null,'K',null]
  ];
  chess.selR=-1;chess.selC=-1;chess.moved=false;
}
initChessBoard();
const chessSym={K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙',k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟'};
const chessImg={};
(function(){
  const map={K:'wK',Q:'wQ',R:'wR',B:'wB',N:'wN',P:'wP',k:'bK',q:'bQ',r:'bR',b:'bB',n:'bN',p:'bP'};
  for(let k in map){let img=new Image();img.src='pieces/'+map[k]+'.svg';chessImg[k]=img;}
})();
const pcd={code:"",target:"2183525",fails:0,hinted:false,hintLevel:0};

let aC=null;
function iAudio(){try{aC=new(window.AudioContext||window.webkitAudioContext)}catch(e){}}
function snd(f,d,t){
  if(!aC)return;
  let o=aC.createOscillator(),g=aC.createGain();
  o.connect(g);g.connect(aC.destination);
  o.frequency.value=f;o.type=t||"sine";
  g.gain.setValueAtTime(.08,aC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,aC.currentTime+d);
  o.start(aC.currentTime);o.stop(aC.currentTime+d);
}
function sClick(){snd(880,.08,"square")}
function sOk(){snd(523,.12);setTimeout(()=>snd(659,.12),120);setTimeout(()=>snd(784,.18),240)}
function sErr(){snd(180,.25,"sawtooth")}
function sPrint(){snd(280+Math.random()*80,.04,"square")}
function sUnlock(){for(let i=0;i<5;i++)setTimeout(()=>snd(400+i*100,.1,"sine"),i*80)}

function msg(t,d){let ml=t.includes("\n");G.msgEl.textContent=t;G.msgEl.classList.toggle("multiline",ml);G.msgEl.classList.add("show");G.msgEl.scrollTop=0;if(G.msgTimer){clearTimeout(G.msgTimer);G.msgTimer=null}if(d!==0)G.msgTimer=setTimeout(()=>{G.msgEl.classList.remove("show");setTimeout(()=>G.msgEl.classList.remove("multiline"),400)},d||2500)}

// Convert screen coords to canvas coords (accounts for CSS scale)
function toCanvas(sx,sy){
  let r=G.cv.getBoundingClientRect();
  return {x:(sx-r.left)/r.width*W, y:(sy-r.top)/r.height*H};
}

function init(){
  G.cv=document.getElementById("cv");G.cx=G.cv.getContext("2d");G.msgEl=document.getElementById("msg");
  // Mouse events
  G.cv.addEventListener("mousemove",e=>{let p=toCanvas(e.clientX,e.clientY);G.mx=p.x;G.my=p.y});
  G.cv.addEventListener("mousedown",onDown);
  G.cv.addEventListener("mouseup",onUp);
  G.cv.addEventListener("click",onClick);
  // Touch events
  G.cv.addEventListener("touchstart",onTouchStart,{passive:false});
  G.cv.addEventListener("touchmove",onTouchMove,{passive:false});
  G.cv.addEventListener("touchend",onTouchEnd,{passive:false});
  document.addEventListener("keydown",onKey);
  G.msgEl.addEventListener("click",()=>dismissMsg());
  G.msgEl.addEventListener("touchend",e=>{if(!G._msgScrolled)dismissMsg();G._msgScrolled=false});
  G.msgEl.addEventListener("touchmove",()=>{G._msgScrolled=true});
  G.msgEl.addEventListener("touchstart",()=>{G._msgScrolled=false});
  iAudio();
  fitCanvas();window.addEventListener("resize",fitCanvas);
  requestAnimationFrame(loop);
  G.st=ST.INTRO;G.introT=performance.now();
}

function inR(x,y,r){return x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h}

function onDown(e){
  let p=toCanvas(e.clientX,e.clientY),x=p.x,y=p.y;
  if(G.st===ST.MODEL){
    for(let i=mdl.parts.length-1;i>=0;i--){
      let p=mdl.parts[i],bb=partBB(p);
      if(x>=bb.x&&x<=bb.x+bb.w&&y>=bb.y&&y<=bb.y+bb.h){
        mdl.selIdx=i;return;
      }
    }
  }
}
function onUp(){}

function partBB(p){
  let gs=mdl.gs;
  let pw=p.w*gs*1.2,ph=p.h*gs*1.2;
  return{x:p.px-pw/2,y:p.py-ph/2,w:pw,h:ph};
}
function snapPart(p){
  if(!p)return;
  let gs=mdl.gs;
  p.px=Math.round(p.px/gs)*gs;
  p.py=Math.round(p.py/gs)*gs;
}

function dismissMsg(){if(G.msgEl.classList.contains("show")){G.msgEl.classList.remove("show");if(G.msgTimer){clearTimeout(G.msgTimer);G.msgTimer=null}setTimeout(()=>G.msgEl.classList.remove("multiline"),400);return true}return false}
function onClick(e){
  let p=toCanvas(e.clientX,e.clientY),x=p.x,y=p.y;
  if(dismissMsg())return;
  if(G.st===ST.INTRO){clickIntro(x,y);return}
  if(G.st===ST.ROOM_L)clickRoomL(x,y);
  else if(G.st===ST.ROOM)clickRoom(x,y);
  else if(G.st===ST.ROOM_R)clickRoomR(x,y);
  else if(G.st===ST.PASSCODE)clickPasscode(x,y);
  else if(G.st===ST.MODEL)clickModel(x,y);
  else if(G.st===ST.SLICE)clickSlice(x,y);
  else if(G.st===ST.FILAMENT)clickFilament(x,y);
  else if(G.st===ST.CHESS)clickChess(x,y);
  else if(G.st===ST.WIN)clickWin(x,y);
  clickInv(x,y);
}

function onKey(e){}

function clickIntro(x,y){
  let elapsed=performance.now()-G.introT;
  if(elapsed<1500)return; // wait for animation
  let bx=W/2-100,by=H/2+120,bw=200,bh=50;
  if(inR(x,y,{x:bx,y:by,w:bw,h:bh})){
    G.st=ST.ROOM;sClick();
  }
}

function clickWin(x,y){
  let rbx=W/2-80,rby=H/2+60,rbw=160,rbh=42;
  if(inR(x,y,{x:rbx,y:rby,w:rbw,h:rbh})){
    G.st=ST.ROOM;G.inv=[];G.sel=null;G.doorAnim=0;G.pcUnlocked=false;
    room.door.locked=true;
    prn.on=false;prn.prog=0;prn.layer=0;prn.hx=50;prn.dir=1;prn.filSet=false;prn.filIdx=null;prn.powered=false;deskDrawerOpen=false;initChessBoard();
    sClick();msg("つくまなラボから脱出せよ！");
  }
}

function clickRoom(x,y){
  // Navigation arrows
  if(clickArrow(x,y,"left")){G.st=ST.ROOM_L;sClick();return}
  if(clickArrow(x,y,"right")){G.st=ST.ROOM_R;sClick();return}
  if(inR(x,y,room.door)){
    if(room.door.locked){
      if(G.sel==="key"){room.door.locked=false;G.inv=G.inv.filter(i=>i!=="key");G.sel=null;sUnlock();msg("鍵が開いた！脱出成功！");setTimeout(()=>{G.st=ST.WIN},1200)}
      else{msg("鍵がかかっている... 鍵が必要だ。");sErr()}
    }else{G.st=ST.WIN;sOk()}
    return;
  }
  if(x>=room.wb.x&&x<=room.wb.x+room.wb.w&&y>=room.wb.y&&y<=room.wb.y+room.wb.h){msg("ホワイトボード: 「鍵 = ヘッド + シャフト + 歯」と書いてある...");sClick();return}
  // 消火器
  if(x>=860&&x<=900&&y>=340&&y<=430){sClick();msg("消火器だ。。",0);return}
  let cd=Math.hypot(x-room.clock.x,y-room.clock.y);
  if(cd<room.clock.r+10){let d=new Date();msg(`現在時刻: ${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")} - 脱出を急がないと！`);sClick()}
}

function clickModel(x,y){
  // Close button
  if(x>W-90&&x<W-10&&y>12&&y<52){G.st=ST.ROOM_L;sClick();return}
  // Export button
  if(x>W-260&&x<W-110&&y>12&&y<52){
    if(validateKey()){G.st=ST.SLICE;slc.done=false;slc.slicing=false;slc.prog=0;slc.layer=0;slc.support=false;sOk();msg("STLエクスポート成功！スライサーを起動...")}
    else{sErr();msg("鍵の形になっていません。ヘッド・シャフト・歯×2を配置してください。",3500)}
    return;
  }
  // Template buttons
  let ty=110;
  for(let k of["head","shaft","tooth"]){
    if(x>15&&x<185&&y>ty&&y<ty+50){addPart(k);sClick();return}
    ty+=65;
  }
}

function addPart(k){
  // Prevent duplicates (tooth can be placed twice)
  let count=mdl.parts.filter(p=>p.k===k).length;
  if(k==="tooth"&&count>=2){msg("キー歯は2つまでです");sErr();return}
  if(k!=="tooth"&&count>=1){msg("このパーツは既に配置済みです");sErr();return}
  let t=mdl.tpl[k];
  // Fixed positions forming a key shape matching the whiteboard sketch
  // Part pixel sizes (gs=20): head=60x60, shaft=160x30, tooth=20x16
  // Parts are drawn centered on (px,py)
  let gcx=740,gcy=350;
  let px,py;
  // Head left edge=630, right edge=690
  if(k==="head"){px=660;py=gcy}
  // Shaft left edge=690 (flush with head right), right edge=850
  else if(k==="shaft"){px=770;py=gcy}
  // Teeth hang below shaft bottom(365): center_y = 365+8 = 373
  else if(k==="tooth"&&count===0){px=730;py=373}
  else{px=790;py=373}
  mdl.parts.push({k:k,w:t.w,h:t.h,px:px,py:py,col:t.col,colD:t.colD,colR:t.colR});
  mdl.selIdx=mdl.parts.length-1;
  // Auto-select highlight briefly
  let placed=mdl.parts.filter(p=>true).length;
  if(placed>=4){msg("全パーツ配置完了！ STLエクスポートしよう！");sOk()}
  else{msg(`${t.label}を配置しました（${placed}/4）`)}
}

function validateKey(){
  let hd=0,sh=0,to=0;
  for(let p of mdl.parts){
    if(p.w>=2.5&&p.w<=4&&p.h>=2.5&&p.h<=4)hd++;
    if(p.w>=6&&p.h>=1&&p.h<=2.5)sh++;
    if(p.w<=2&&p.h<=1.5)to++;
  }
  return hd>=1&&sh>=1&&to>=2&&mdl.parts.length>=4;
}

function clickSlice(x,y){
  if(x>W-90&&x<W-10&&y>12&&y<52){G.st=ST.MODEL;sClick();return}
  // Support checkbox (left panel, y around 258)
  if(x>12&&x<190&&y>246&&y<280){slc.support=!slc.support;sClick();return}
  // Slice button
  if(!slc.done&&!slc.slicing&&x>W/2-110&&x<W/2+110&&y>H-130&&y<H-85){
    if(!slc.support){sErr();msg("⚠ サポートが無効です！オーバーハング部分が崩れます。サポートを有効にしてください。",4000);return}
    startSlice();sClick();return
  }
  // Send to printer
  if(slc.done&&x>W/2-130&&x<W/2+130&&y>H-130&&y<H-85){
    if(!prn.powered){sErr();msg("⚠ 送信失敗：3Dプリンターの電源が入っていません。\n工作室（3DP室）で電源ケーブルを接続してください。",5000);return}
    if(!prn.filSet){sErr();msg("⚠ 送信失敗：3Dプリンターにフィラメントがセットされていません。\n工作室（3DP室）でフィラメントをセットしてから\nもう一度「プリンターに送信」してください。",5000);return}
    G.st=ST.PRINT;prn.on=true;prn.prog=0;prn.layer=0;prn.hx=50;sClick();msg("Gコードを3Dプリンターに送信...");return;
  }
  // Layer slider
  if(x>W-70&&x<W-30&&y>100&&y<520){slc.layer=Math.max(0,Math.min(slc.total,Math.floor((y-100)/420*slc.total)))}
}

function startSlice(){
  slc.slicing=true;slc.prog=0;
  let iv=setInterval(()=>{
    slc.prog+=2;snd(400+slc.prog*4,.03,"square");
    if(slc.prog>=100){clearInterval(iv);slc.slicing=false;slc.done=true;genGcode();sOk();msg("スライス完了！ 50レイヤー / 推定12分")}
  },40);
}

function genGcode(){
  slc.gc=["; つくまなスライサー v2.1","G28 ; ホーム","M104 S210 ; ノズル温度","M140 S60 ; ベッド温度","G92 E0"];
  for(let i=0;i<slc.total;i++){
    slc.gc.push(`; レイヤー ${i} / Z=${(i*.2).toFixed(1)}mm`);
    slc.gc.push(`G1 Z${(i*.2).toFixed(2)} F3000`);
    slc.gc.push(`G1 X${(10+Math.random()*40).toFixed(1)} Y${(10+Math.random()*30).toFixed(1)} E${(i*.5).toFixed(2)} F1500`);
  }
}

function clickInv(x,y){
  if(y<H-INV_H)return;
  let sx=160,sy=H-INV_H+10;
  for(let i=0;i<G.inv.length;i++){
    let ix=sx+i*75;
    if(x>ix&&x<ix+60&&y>sy&&y<sy+60){
      G.sel=G.sel===G.inv[i]?null:G.inv[i];sClick();
      if(G.sel){
        if(G.sel==="key")msg("「3Dプリント鍵」を選択中 → ドアに使おう！");
        else if(G.sel==="power_cable")msg("電源ケーブルを選択中 → 3Dプリンターに接続しよう！");
        else if(G.sel.startsWith("fil_"))msg(filNames[parseInt(G.sel[4])]+"のフィラメントを選択中");
      }
    }
  }
}

// ==================== DRAWING ====================

function draw(){
  const c=G.cx;
  c.fillStyle="#080812";c.fillRect(0,0,W,H);
  if(G.st===ST.INTRO){drawIntro(c);return}
  if(G.st===ST.ROOM_L)drawRoomL(c);
  else if(G.st===ST.ROOM)drawRoom(c);
  else if(G.st===ST.ROOM_R)drawRoomR(c);
  else if(G.st===ST.PASSCODE)drawPasscode(c);
  else if(G.st===ST.MODEL)drawModel(c);
  else if(G.st===ST.SLICE)drawSlice(c);
  else if(G.st===ST.PRINT)drawPrint(c);
  else if(G.st===ST.FILAMENT)drawFilament(c);
  else if(G.st===ST.CHESS)drawChess(c);
  else if(G.st===ST.WIN)drawWin(c);
  if(G.st!==ST.WIN)drawInv(c);
  // Cursor indicator when item selected
  if(G.sel&&(G.st===ST.ROOM||G.st===ST.ROOM_L||G.st===ST.ROOM_R)){
    c.save();c.globalAlpha=.7;
    if(G.sel==="power_cable"){
      c.strokeStyle="#222";c.lineWidth=3;
      c.beginPath();c.moveTo(G.mx+10,G.my+10);c.lineTo(G.mx+25,G.my+25);c.stroke();
      c.fillStyle="#333";c.fillRect(G.mx+5,G.my+4,10,12);
      c.fillStyle="#aaa";c.fillRect(G.mx+7,G.my+2,2,4);c.fillRect(G.mx+12,G.my+2,2,4);
    }else if(G.sel.startsWith("fil_")){
      let fi=parseInt(G.sel[4]);
      c.strokeStyle=filColors[fi];c.lineWidth=3;
      c.beginPath();c.arc(G.mx+20,G.my+20,10,0,Math.PI*2);c.stroke();
      c.strokeStyle=filDark[fi];c.lineWidth=2;
      c.beginPath();c.arc(G.mx+20,G.my+20,4,0,Math.PI*2);c.stroke();
    }else{
      drawKeySmall(c,G.mx+20,G.my+20,16,prn.filIdx!=null?filColors[prn.filIdx]:null);
    }
    c.restore();
  }
}

// ==================== SHARED ROOM BACKGROUND ====================

function drawRoomBG(c){
  let t=G.t;
  // Back wall
  let wg=c.createLinearGradient(0,0,0,420);
  wg.addColorStop(0,"#f5f5f0");wg.addColorStop(1,"#e8e8e3");
  c.fillStyle=wg;c.fillRect(0,0,W,420);
  // Wall texture lines
  c.strokeStyle="rgba(0,0,0,.03)";c.lineWidth=1;
  for(let i=0;i<W;i+=40){c.beginPath();c.moveTo(i,0);c.lineTo(i,420);c.stroke()}
  // Floor
  let fg=c.createLinearGradient(0,420,0,H-INV_H);
  fg.addColorStop(0,"#d5d5d0");fg.addColorStop(1,"#c0c0bb");
  c.fillStyle=fg;c.fillRect(0,420,W,H-420-INV_H);
  // Floor tiles
  c.strokeStyle="rgba(0,0,0,.08)";c.lineWidth=1;
  for(let x=0;x<W;x+=80){c.beginPath();c.moveTo(x,420);c.lineTo(x,H-INV_H);c.stroke()}
  for(let y=420;y<H-INV_H;y+=60){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke()}
  // Floor reflection
  c.fillStyle="rgba(255,255,255,.15)";c.fillRect(200,430,300,8);c.fillRect(700,450,200,5);
  // Baseboard
  c.fillStyle="#bbb8b0";c.fillRect(0,415,W,8);
  // Ceiling Lights
  for(let i=0;i<4;i++){
    let lx=180+i*290;
    let flicker=.85+Math.sin(t*.003+i*1.7)*.15;
    c.fillStyle="#ccc";c.fillRect(lx-70,8,140,10);
    c.fillStyle="#ddd";c.fillRect(lx-65,10,130,6);
    let lg=c.createRadialGradient(lx,25,5,lx,25,200);
    lg.addColorStop(0,`rgba(255,255,240,${.15*flicker})`);lg.addColorStop(1,"rgba(255,255,240,0)");
    c.fillStyle=lg;c.fillRect(lx-200,0,400,200);

  c.shadowColor="rgba(0,120,200,.2)";c.shadowBlur=10;
  c.fillStyle="#ffffff";c.fillRect(100,60,230,165);
  c.restore();
  c.strokeStyle="#2090d0";c.lineWidth=3;c.strokeRect(100,60,230,165);
  c.strokeStyle="rgba(0,120,200,.2)";c.lineWidth=1;c.strokeRect(108,68,214,149);
  c.fillStyle="#1a7ab5";c.font='bold 30px "Noto Sans JP"';c.textAlign="center";
  c.fillText("つくまなラボ",215,120);
  c.fillStyle="#2090d0";c.font='14px "Noto Sans JP"';
  c.fillText("TUKUMANA LAB",215,150);
  c.fillStyle="#5aacda";c.font='12px "Noto Sans JP"';
  c.fillText("— つくって学ぶ —",215,180);
  c.fillStyle="#2090d0";c.font="20px sans-serif";c.fillText("🔧⚙️🔬",215,205);

  // === Sticky note on monitor ===
  let sn={x:W/2+70,y:268,w:38,h:35};
  let snH=inR(G.mx,G.my,sn);
  c.save();
  c.translate(sn.x+sn.w/2,sn.y+sn.h/2);
  c.rotate(-0.12);
  c.fillStyle=snH?"#fff44f":"#f5e642";
  c.fillRect(-sn.w/2,-sn.h/2,sn.w,sn.h);
  c.strokeStyle="rgba(0,0,0,.15)";c.lineWidth=1;
  c.strokeRect(-sn.w/2,-sn.h/2,sn.w,sn.h);
  // Fold corner
  c.fillStyle="rgba(0,0,0,.08)";
  c.beginPath();c.moveTo(sn.w/2,sn.h/2);c.lineTo(sn.w/2-10,sn.h/2);c.lineTo(sn.w/2,sn.h/2-10);c.closePath();c.fill();
  // Text on sticky
  c.fillStyle="#333";c.font='8px "Noto Sans JP"';c.textAlign="center";
  c.fillText("memo",0,-4);
  c.fillText("📝",0,10);
  c.restore();
  if(snH){c.strokeStyle="rgba(0,200,255,.5)";c.lineWidth=2;c.strokeRect(sn.x-2,sn.y-2,sn.w+4,sn.h+4)}

  // === Torn Hiragana Chart on wall (behind PC) ===
  let hc={x:W/2-240,y:55,w:185,h:195};
  let hcH=inR(G.mx,G.my,hc);
  // Full 五十音 grid data (5 cols x 10 rows, but we only show first few rows)
  let hAllChars=[
    ["あ","い","う","え","お"],
    ["か","き","く","け","こ"],
    ["さ","し","す","せ","そ"],
    ["た","ち","つ","て","と"],
    ["な","に","ぬ","ね","の"]
  ];
  let hNums={"あ":"1","い":"2","う":"3","か":"6","き":"7","さ":"11"};
  let cellW=30,cellH=28;
  let gridX=hc.x+12,gridY=hc.y+30;
  let numRows=5,numCols=5;
  // Explicit visible cells: あいう(row0), かき(row1), さし(row2)
  let visibleCells=[[0,0],[0,1],[0,2],[1,0],[1,1],[2,0],[2,1]];
  function isCellVisible(row,col){
    return visibleCells.some(v=>v[0]===row&&v[1]===col);
  }
  // Tear line passes OUTSIDE the rightmost visible cell in each row
  // Row 0: right edge of う(col2) = gridX+3*cellW → tear at col 3.3
  // Row 1: right edge of き(col1) = gridX+2*cellW → tear at col 2.3
  // Row 2: right edge of し(col1) = gridX+2*cellW → tear at col 2.3
  // Row 3+: nothing → tear at col < 0
  // Line: tearCol = 3.6 - row*1.15
  // Row0=3.6, Row1=2.45, Row2=1.3, Row3=0.15, Row4=-1.0
  // Row2=1.3 means tear at gridX+39px, but し right edge=gridX+60. Not enough!
  // Use piecewise: generous padding past each row's last visible cell
  let tearColByRow=[3.6, 3.15, 2.5, 1.2, -0.5, -1.5];
  let tearPoints=[];
  for(let i=0;i<tearColByRow.length;i++){
    let px=gridX+tearColByRow[i]*cellW;
    let py=gridY+i*cellH;
    let jag=Math.sin(i*5.7+2)*3+Math.cos(i*9.3)*2;
    tearPoints.push({x:px+jag,y:py});
    // Add mid-point jag between rows for more realistic tear
    if(i<tearColByRow.length-1){
      let midTC=(tearColByRow[i]+tearColByRow[i+1])/2;
      let mpx=gridX+midTC*cellW;
      let mpy=py+cellH/2;
      let mjag=Math.sin((i+0.5)*8.1)*4+Math.cos((i+0.5)*6.3)*2;
      tearPoints.push({x:mpx+mjag,y:mpy});
    }
  }
  // Paper shape
  c.save();
  c.fillStyle=hcH?"#fff":"#f8f5f0";
  let tearStartX=tearPoints[0].x;
  c.beginPath();
  c.moveTo(hc.x+2,hc.y+3);
  c.lineTo(hc.x+4,hc.y);
  c.lineTo(tearStartX+6,hc.y+1);
  c.lineTo(tearStartX+3,hc.y+6);
  let leftEdgeX=hc.x+2;
  let lastTear=tearPoints[tearPoints.length-1];
  // Only draw tear points until they reach the left edge of the paper
  let paperBottomY=tearPoints[0].y;
  for(let i=0;i<tearPoints.length;i++){
    let tp=tearPoints[i];
    if(tp.x<=leftEdgeX+3){
      // Interpolate where tear crosses the left edge
      if(i>0){
        let prev=tearPoints[i-1];
        let t=(leftEdgeX+3-prev.x)/(tp.x-prev.x);
        paperBottomY=prev.y+t*(tp.y-prev.y);
        c.lineTo(leftEdgeX+3,paperBottomY);
      } else {
        paperBottomY=tp.y;
        c.lineTo(tp.x,tp.y);
      }
      break;
    }
    c.lineTo(tp.x,tp.y);
    paperBottomY=tp.y;
  }
  c.closePath();
  c.fill();
  c.strokeStyle="rgba(0,0,0,.12)";c.lineWidth=1;c.stroke();
  c.restore();
  // Torn edge highlight (only draw points within paper bounds)
  c.save();
  c.strokeStyle="rgba(160,140,120,.6)";c.lineWidth=1.5;
  c.beginPath();
  c.moveTo(tearStartX+3,hc.y+6);
  for(let tp of tearPoints){ if(tp.x<leftEdgeX) break; c.lineTo(tp.x,tp.y); }
  c.stroke();
  c.strokeStyle="rgba(255,255,255,.5)";c.lineWidth=0.5;
  c.beginPath();
  c.moveTo(tearStartX+2,hc.y+7);
  for(let tp of tearPoints){ if(tp.x<leftEdgeX) break; c.lineTo(tp.x-1,tp.y-1); }
  c.stroke();
  c.restore();
  // Clip & draw content
  c.save();
  c.beginPath();
  c.moveTo(hc.x-5,hc.y-5);
  c.lineTo(tearStartX+12,hc.y-5);
  c.lineTo(tearStartX+3,hc.y+6);
  for(let tp of tearPoints) c.lineTo(tp.x,tp.y);
  c.lineTo(hc.x-5,lastTear.y+10);
  c.closePath();
  c.clip();
  // Title
  c.fillStyle="#c33";c.font='bold 13px "Noto Sans JP"';c.textAlign="center";
  c.fillText("ひらがなひょう",hc.x+hc.w/2-15,hc.y+20);
  // Draw visible cells
  for(let vc of visibleCells){
    let row=vc[0],col=vc[1];
    let cx=gridX+col*cellW+cellW/2;
    let cy=gridY+row*cellH;
    // Cell border
    c.strokeStyle="rgba(0,0,0,.1)";c.lineWidth=0.5;
    c.strokeRect(gridX+col*cellW,cy,cellW,cellH);
    // Character
    let ch=hAllChars[row][col];
    c.fillStyle="#222";c.font='15px "Noto Sans JP"';c.textAlign="center";
    c.fillText(ch,cx,cy+20);
    // Number in bottom-right corner
    if(hNums[ch]){
      c.fillStyle="#777";c.font='bold 8px "Share Tech Mono"';c.textAlign="right";
      c.fillText(hNums[ch],gridX+col*cellW+cellW-2,cy+cellH-2);
    }
  }
  c.restore();
  if(hcH){c.strokeStyle="rgba(0,200,255,.5)";c.lineWidth=2;c.strokeRect(hc.x-2,hc.y-2,hc.w+4,hc.h+4)}

  // === Bookshelf ===
  let bsR={x:800,y:100,w:180,h:320};
  let bsH=inR(G.mx,G.my,bsR);
  c.fillStyle=bsH?"#6a5040":"#5a4030";c.fillRect(800,100,180,320);
  c.strokeStyle="#3a2818";c.lineWidth=2;c.strokeRect(800,100,180,320);
  for(let sh=0;sh<4;sh++){
    let sy=100+sh*80;
    c.fillStyle="#4a3525";c.fillRect(802,sy+70,176,8);
    // Books
    let bx=806;
    for(let b=0;b<6;b++){
      let bw=12+Math.sin(sh*5+b*3)*8;
      let bh=55+Math.sin(sh*7+b*2)*12;
      let colors=["#c44","#48a","#4a4","#a84","#84a","#aa4","#a4a","#4aa"];
      c.fillStyle=colors[(sh*6+b)%colors.length];
      c.fillRect(bx,sy+70-bh,bw,bh);
      c.strokeStyle="rgba(0,0,0,.15)";c.lineWidth=1;c.strokeRect(bx,sy+70-bh,bw,bh);
      bx+=bw+3;
    }
  }

  // Right arrow → center room
  drawArrow(c,"right","メイン室");
}

function clickRoomR(x,y){
  // Left arrow ← center
  if(clickArrow(x,y,"left")){G.st=ST.ROOM;sClick();return}
  // Filament rack
  if(inR(x,y,{x:100,y:120,w:120,h:280})){
    if(G.inv.some(i=>i.startsWith("fil_"))){sClick();msg("もうフィラメントを取った。");return}
    G.st=ST.FILAMENT;sClick();return;
  }
  // Tool board
  if(inR(x,y,{x:850,y:80,w:180,h:200})){sClick();msg("定規やニッパーなど各種工具が並んでいる。",0);return}
  // Chess board on desk
  let dk={x:840,y:380,w:200,h:70};
  let cbx=dk.x+15,cby=dk.y,cbW=75;
  if(inR(x,y,{x:cbx,y:cby-42,w:cbW,h:55})){
    G.st=ST.CHESS;sClick();msg("チェスボードを調べる...",1500);return;
  }
  // Desk (not chess board)
  if(inR(x,y,{x:dk.x,y:dk.y,w:dk.w,h:dk.h+80})){
    if(deskDrawerOpen){
      if(!G.inv.includes("power_cable")&&!prn.powered){
        G.inv.push("power_cable");sOk();msg("電源ケーブルを手に入れた！",3000);return;
      }
      sClick();msg("引き出しの中は空だ。",0);return;
    }
    sClick();msg("机だ。上にチェスボードが置いてある。\nチェスの駒は3Dプリンターで作られているようだ。\n引き出しには鍵がかかっている。",0);return;
  }
  // 3D Printer
  let pr={x:W/2-130,y:220,w:260,h:230};
  if(inR(x,y,pr)){
    // Power cable connection
    if(!prn.powered&&G.sel==="power_cable"){
      prn.powered=true;
      G.inv=G.inv.filter(i=>i!=="power_cable");G.sel=null;
      sOk();msg("電源ケーブルを接続した。\n3Dプリンターの電源が入った！",3000);return;
    }
    if(!prn.powered){
      sErr();msg("3Dプリンター「TUKUMANA X1」だ。\n電源ケーブルが接続されていない。\n電源ケーブルを探さないと...",0);return;
    }
    // Powered — filament logic
    if(!G.inv.some(i=>i.startsWith("fil_"))&&!prn.filSet){
      sClick();msg("3Dプリンターの電源は入っているが、\nフィラメントがセットされていないようだ。",0);return;
    }
    if(!prn.filSet&&G.sel&&G.sel.startsWith("fil_")){
      let fi=parseInt(G.sel[4]);
      prn.filSet=true;prn.filIdx=fi;
      G.inv=G.inv.filter(i=>!i.startsWith("fil_"));G.sel=null;
      sOk();msg("フィラメントをセットした。\n3Dモデルのデータを送ると、それを出力できるようになりました。",0);return;
    }
    if(!prn.filSet){
      sClick();msg("フィラメントをセットしてください。\n持ち物でフィラメントを選択してからクリックしてください。",0);return;
    }
    sClick();msg("3Dプリンター — フィラメントセット済み。モデルデータを送信してください。");return;
  }
}

// ==================== CHESS BOARD PUZZLE ====================

function drawChess(c){
  // Background
  let bg=c.createRadialGradient(W/2,H/2,100,W/2,H/2,600);
  bg.addColorStop(0,"#2a1f14");bg.addColorStop(1,"#0e0a06");
  c.fillStyle=bg;c.fillRect(0,0,W,H);

  // Title
  c.fillStyle="#ddc";c.font='bold 22px "Noto Sans JP"';c.textAlign="center";c.textBaseline="alphabetic";
  c.fillText("♟ チェスボード",W/2,38);
  c.fillStyle="#887";c.font='13px "Noto Sans JP"';
  c.fillText("駒を動かしてみよう",W/2,60);

  // Board layout
  let sz=62; // square size
  let brd=sz*8;
  let ox=W/2-brd/2, oy=75;
  let frame=10;

  // Wooden frame
  c.fillStyle="#5a3a18";c.fillRect(ox-frame,oy-frame,brd+frame*2,brd+frame*2);
  c.fillStyle="#4a2e12";c.fillRect(ox-frame+3,oy-frame+3,brd+frame*2-6,brd+frame*2-6);
  c.strokeStyle="#3a2008";c.lineWidth=2;c.strokeRect(ox-frame,oy-frame,brd+frame*2,brd+frame*2);

  // Draw squares
  for(let r=0;r<8;r++){
    for(let cl=0;cl<8;cl++){
      let sx=ox+cl*sz, sy=oy+r*sz;
      let light=(r+cl)%2===0;
      let isSel=chess.selR===r&&chess.selC===cl;
      let isHov=inR(G.mx,G.my,{x:sx,y:sy,w:sz,h:sz});

      if(isSel) c.fillStyle="#d4a030";
      else if(isHov&&chess.selR>=0) c.fillStyle=light?"#c8e8a0":"#7aaa50";
      else if(isHov) c.fillStyle=light?"#f0e8c0":"#a08860";
      else c.fillStyle=light?"#e8d4a8":"#8b6b4a";

      c.fillRect(sx,sy,sz,sz);

      // Draw piece
      let p=chess.board[r][cl];
      if(p&&chessImg[p]&&chessImg[p].complete){
        let psz=sz-8;

      // Selection glow

      }

  }

  // Board border
  c.strokeStyle="#2a1a08";c.lineWidth=1;c.strokeRect(ox,oy,brd,brd);

  // Rank/File labels
  c.font='13px "Share Tech Mono"';c.textBaseline='middle';

  let snx=ox+brd+18, sny=oy+brd-110;
  c.save();
  c.translate(snx+45,sny+40);c.rotate(0.06);c.translate(-45,-40);
  // Note shadow
  c.fillStyle="rgba(0,0,0,.3)";c.fillRect(3,3,90,80);
  // Note paper
  c.fillStyle="#fff8a0";c.fillRect(0,0,90,80);
  // Tape at top
  c.fillStyle="rgba(200,200,180,.5)";c.fillRect(25,-5,40,12);
  // Text
  c.fillStyle="#c00";c.font='bold 16px "Noto Sans JP"';c.textAlign="center";c.textBaseline="middle";
  c.fillText("窒息",45,30);

  // Back button

  c.fillStyle=bH?"#555":"#3a3a3a";c.fillRect(bx,by,bw,bh);
  c.strokeStyle=bH?"#aaa":"#666";c.lineWidth=2;c.strokeRect(bx,by,bw,bh);
  c.fillStyle="#ddd";c.font='16px "Noto Sans JP"';c.textAlign="center";c.textBaseline="middle";
  c.fillText("← 戻る",bx+bw/2,by+bh/2);

  // Hint if moved
  if(chess.moved){
    c.fillStyle="#8d8";c.font='14px "Noto Sans JP"';c.textAlign="center";c.textBaseline="alphabetic";
    c.fillText("カチッ…引き出しのロックが外れた！",W/2,H-10);
  }
}

function clickChess(x,y){
  let sz=62;
  let brd=sz*8;
  let ox=W/2-brd/2, oy=75;
  let frame=10;
  // Back button
  if(inR(x,y,{x:ox-frame,y:oy+brd+frame+22,w:120,h:38})){G.st=ST.ROOM_R;sClick();return}

  // Find clicked square
  if(x>=ox&&x<ox+brd&&y>=oy&&y<oy+brd){
    let cl=Math.floor((x-ox)/sz);
    let r=Math.floor((y-oy)/sz);
    if(cl>=0&&cl<8&&r>=0&&r<8){
      if(chess.selR<0){
        if(chess.board[r][cl]){chess.selR=r;chess.selC=cl;sClick();}
      } else {
        if(chess.selR===r&&chess.selC===cl){
          chess.selR=-1;chess.selC=-1;sClick();
        } else {
          // Check if this is the correct move: Ng5->f7 (row3,col6 -> row1,col5)
          let fromR=chess.selR,fromC=chess.selC;
          let piece=chess.board[fromR][fromC];
          let isSmothered=(piece==='N'&&fromR===3&&fromC===6&&r===1&&cl===5);
          if(isSmothered){
            chess.board[r][cl]=chess.board[fromR][fromC];
            chess.board[fromR][fromC]=null;
            chess.selR=-1;chess.selC=-1;
            sOk();
            chess.moved=true;
            deskDrawerOpen=true;
            msg("ナイトをf7に動かした。\n窒息メイト（Smothered Mate）！\nカチッ…机の引き出しのロックが外れた！",0);
          } else {
            // Wrong move - animate piece, then revert
            let savedPiece=chess.board[fromR][fromC];
            let capturedPiece=chess.board[r][cl];
            chess.board[r][cl]=savedPiece;
            chess.board[fromR][fromC]=null;
            chess.selR=-1;chess.selC=-1;
            sErr();
            setTimeout(()=>{
              chess.board[fromR][fromC]=savedPiece;
              chess.board[r][cl]=capturedPiece;
              msg("その手では何も起こらない…\n付箋のヒントを考えてみよう。",3000);
            },600);
          }
        }
      }
    }
  }
}

const filNames=["青","赤","緑","黄色","紫"];
const filColors=["#4af","#f44","#4f4","#fa4","#f4f"];
const filDark=["#28e","#c22","#2c2","#c80","#c2c"];

function drawFilament(c){
  // Dim background
  c.fillStyle="rgba(0,0,0,.75)";c.fillRect(0,0,W,H);

  // Panel
  let pw=600,ph=400,px=W/2-pw/2,py=H/2-ph/2-20;
  c.fillStyle="#1a1e2a";roundRect(c,px,py,pw,ph,12);c.fill();
  c.strokeStyle="#0af";c.lineWidth=2;roundRect(c,px,py,pw,ph,12);c.stroke();

  // Title
  c.fillStyle="#0cf";c.font='bold 22px "Noto Sans JP"';c.textAlign="center";
  c.fillText("フィラメントを選んでください",W/2,py+40);

  c.fillStyle="#8ab";c.font='14px "Noto Sans JP"';
  c.fillText("青、赤、緑、黄色、紫のフィラメントが保管されている。",W/2,py+70);

  // Spool buttons
  let spW=80,spH=120,gap=20;
  let totalW=spW*5+gap*4;
  let startX=W/2-totalW/2;
  let spY=py+100;
  for(let i=0;i<5;i++){
    let sx=startX+i*(spW+gap);
    let hov=inR(G.mx,G.my,{x:sx,y:spY,w:spW,h:spH});
    // Button bg
    c.fillStyle=hov?"#2a3040":"#141820";
    roundRect(c,sx,spY,spW,spH,8);c.fill();
    c.strokeStyle=hov?filColors[i]:"#333";
    c.lineWidth=hov?2:1;
    roundRect(c,sx,spY,spW,spH,8);c.stroke();
    // Spool
    c.strokeStyle=filColors[i];c.lineWidth=4;
    c.beginPath();c.arc(sx+spW/2,spY+40,25,0,Math.PI*2);c.stroke();
    c.strokeStyle=filDark[i];c.lineWidth=2;
    c.beginPath();c.arc(sx+spW/2,spY+40,10,0,Math.PI*2);c.stroke();
    // Inner spokes
    for(let s=0;s<4;s++){
      let a=s*Math.PI/2;
      c.strokeStyle=filColors[i];c.lineWidth=1;
      c.beginPath();
      c.moveTo(sx+spW/2+Math.cos(a)*10,spY+40+Math.sin(a)*10);
      c.lineTo(sx+spW/2+Math.cos(a)*25,spY+40+Math.sin(a)*25);
      c.stroke();
    }
    // Label
    c.fillStyle=hov?"#fff":"#aaa";c.font='bold 14px "Noto Sans JP"';c.textAlign="center";
    c.fillText(filNames[i],sx+spW/2,spY+spH-10);
  }

  // Close button
  c.fillStyle="#333";roundRect(c,W/2-60,py+ph-55,120,36,6);c.fill();
  c.strokeStyle="#666";c.lineWidth=1;roundRect(c,W/2-60,py+ph-55,120,36,6);c.stroke();
  c.fillStyle="#aaa";c.font='14px "Noto Sans JP"';c.textAlign="center";
  c.fillText("戻る",W/2,py+ph-31);
}

function clickFilament(x,y){

function clickPasscode(x,y){
  let mx=W/2-260,my=40,mw=520,mh=500;
  // Number pad
  let bw=70,bh=50,gap=8;
  let totalW=bw*3+gap*2;
  let bx=W/2-totalW/2,by=my+225;
  for(let r=0;r<4;r++){
    for(let col=0;col<3;col++){
      let px=bx+col*(bw+gap),py=by+r*(bh+gap);

        let labels=[["1","2","3"],["4","5","6"],["7","8","9"],["C","0","OK"]];
        let label=labels[r][col];
        if(label==="C"){pcd.code="";sClick()}
        else if(label==="OK"){checkPasscode()}
        else if(pcd.code.length<7){pcd.code+=label;sClick()}
        return;
      }
    }
  }
  // Back button
  let bbx=W/2-60,bby=my+mh+40;
  if(inR(x,y,{x:bbx,y:bby,w:120,h:36})){G.st=ST.ROOM_L;pcd.code="";pcd.fails=0;pcd.hinted=false;pcd.hintLevel=0;sClick();return}
}

function checkPasscode(){
  if(pcd.code===pcd.target){
    G.pcUnlocked=true;pcd.fails=0;pcd.hinted=false;pcd.hintLevel=0;sUnlock();
    msg("パスコードが正しい！PCのロックが解除されました！",3000);
    setTimeout(()=>{
      G.st=ST.MODEL;mdl.parts=[];mdl.selIdx=-1;mdl.rot=0;
      msg("TukuCADを起動...");
    },1200);
  }else{
    pcd.fails++;sErr();
    let hints=[
      "ヒント: PC横の破れたひらがな表と小さな数字をよく見よう。",
      "さらにヒント: 付箋の『いつもの』を、ひらがな表の番号に置き換えてみよう（例: い=2）。"
    ];
    if(pcd.fails>=3&&pcd.hintLevel<hints.length){
      msg(`パスコードが違います...\n${hints[pcd.hintLevel]}`,4500);
      pcd.hintLevel++;
    }else{
      msg("パスコードが違います...");
    }
    pcd.code="";
  }
}

function drawIsoPart(c,p,sel,t){
  let gs=mdl.gs;
  let pw=p.w*gs,ph=p.h*gs;
  let depth=12;
  let x=p.px,y=p.py;
  
  c.save();c.translate(x,y);
  
  // Shadow
  c.fillStyle="rgba(0,0,0,.3)";
  c.fillRect(-pw/2+4,ph/2+2,pw,6);
  
  // Right face
  c.fillStyle=sel?"#1a5a8a":p.colR;
  c.beginPath();
  c.moveTo(pw/2,-ph/2);c.lineTo(pw/2+depth,-ph/2-depth*.6);
  c.lineTo(pw/2+depth,ph/2-depth*.6);c.lineTo(pw/2,ph/2);
  c.closePath();c.fill();
  
  // Top face
  c.fillStyle=sel?"#4ab0ff":p.col;
  c.beginPath();
  c.moveTo(-pw/2,-ph/2);c.lineTo(-pw/2+depth,-ph/2-depth*.6);
  c.lineTo(pw/2+depth,-ph/2-depth*.6);c.lineTo(pw/2,-ph/2);
  c.closePath();c.fill();
  
  // Front face
  c.fillStyle=sel?"#2a80c0":p.colD;
  c.fillRect(-pw/2,-ph/2,pw,ph);
  
  // Grid lines on front face
  c.strokeStyle="rgba(255,255,255,.08)";c.lineWidth=.5;
  for(let gx=-pw/2+gs;gx<pw/2;gx+=gs){c.beginPath();c.moveTo(gx,-ph/2);c.lineTo(gx,ph/2);c.stroke()}
  for(let gy=-ph/2+gs;gy<ph/2;gy+=gs){c.beginPath();c.moveTo(-pw/2,gy);c.lineTo(pw/2,gy);c.stroke()}
  
  // Outline
  c.strokeStyle=sel?"#ff0":"rgba(0,200,255,.5)";c.lineWidth=sel?2.5:1;
  c.strokeRect(-pw/2,-ph/2,pw,ph);
  
  // Selection handles
  if(sel){
    let hs=5;
    c.fillStyle="#ff0";
    for(let hx of[-pw/2,pw/2]){for(let hy of[-ph/2,ph/2]){c.fillRect(hx-hs/2,hy-hs/2,hs,hs)}}
    // Pulse
    c.strokeStyle=`rgba(255,255,0,${.3+Math.sin(t*.005)*.2})`;c.lineWidth=1;
    c.strokeRect(-pw/2-4,-ph/2-4,pw+8,ph+8);
  }
  
  // Label
  c.fillStyle=sel?"#ff0":"#8cf";c.font='bold 11px "Noto Sans JP"';c.textAlign="center";
  c.fillText(mdl.tpl[p.k].label,0,ph/2+16);
  
  c.restore();
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

  c.save();

  // Draw build plate outline
  c.strokeStyle="rgba(100,100,150,.3)";c.lineWidth=1;c.setLineDash([5,5]);

  // Key head (always visible)

  c.strokeStyle="rgba(60,165,245,.9)";c.lineWidth=1.5;
  c.fillRect(kcx,kcy-40,70,80);c.strokeRect(kcx,kcy-40,70,80);

  c.beginPath();c.arc(kcx+35,kcy,12,0,Math.PI*2);c.fill();

  // Key teeth (2 teeth matching the modeled key)
  let teeth=[{x:kcx+120,h:25},{x:kcx+170,h:25}];
  for(let tooth of teeth){

  // Layer lines overlay
  c.strokeStyle="rgba(0,255,255,.15)";c.lineWidth=.5;
  for(let i=0;i<40;i++){
    let ly=kcy-50+i*3;

  // Current layer highlight line
  let clY=kcy-50+layerPct*100;
  c.strokeStyle="#ff0";c.lineWidth=2;c.setLineDash([8,4]);
  c.beginPath();c.moveTo(vx,clY);c.lineTo(vx+vw,clY);c.stroke();
  c.setLineDash([]);

  c.fillText(`Z=${(slc.layer*0.2).toFixed(1)}mm`,vx+10,clY-5);
  
  // Infill pattern (crosshatch)
  c.save();c.globalAlpha=.15;c.strokeStyle="#0af";c.lineWidth=.5;
  for(let i=-20;i<30;i++){
    c.beginPath();c.moveTo(kcx+i*12,kcy-50);c.lineTo(kcx+i*12+50,kcy+50);c.stroke();
    c.beginPath();c.moveTo(kcx+i*12+50,kcy-50);c.lineTo(kcx+i*12,kcy+50);c.stroke();
  }
  c.restore();
  
  c.restore();// clip
  
  // === Layer slider ===
  let slX=W-55,slY=100,slH=420;

  c.fillStyle=trackG;c.fillRect(slX,slY+5,10,slH-10);
  // Filled portion
  let slPos=slY+5+(slc.layer/slc.total)*(slH-10);
  c.fillStyle="#0af";c.fillRect(slX,slY+5,10,slPos-slY-5);
  // Handle
  c.fillStyle="#0cf";
  roundRect(c,slX-10,slPos-10,30,20,4);c.fill();
  c.strokeStyle="#fff";c.lineWidth=1;roundRect(c,slX-10,slPos-10,30,20,4);c.stroke();
  c.fillStyle="#000";c.font='bold 9px "Share Tech Mono"';c.textAlign="center";
  c.fillText(slc.layer,slX+5,slPos+4);
  // Labels
  c.fillStyle="#578";c.font='11px "Noto Sans JP"';
  c.fillText("0",slX+5,slY-5);c.fillText(slc.total,slX+5,slY+slH+15);
  
  // Current layer display
  c.fillStyle="#fff";c.font='bold 16px "Noto Sans JP"';c.textAlign="right";
  c.fillText(`レイヤー: ${slc.layer} / ${slc.total}`,W-80,80);
  c.fillStyle="#578";c.font='12px "Share Tech Mono"';
  c.fillText(`Z: ${(slc.layer*0.2).toFixed(1)} / ${(slc.total*0.2).toFixed(1)} mm`,W-80,96);
  
  // === Bottom buttons ===
  if(!slc.done){
    if(slc.slicing){
      // Progress bar
      c.fillStyle="#1a1e2a";roundRect(c,W/2-180,H-140,360,35,6);c.fill();
      c.fillStyle="#0a4";roundRect(c,W/2-180,H-140,360*(slc.prog/100),35,6);c.fill();
      c.strokeStyle="#0f0";c.lineWidth=2;roundRect(c,W/2-180,H-140,360,35,6);c.stroke();
      c.fillStyle="#fff";c.font='bold 15px "Noto Sans JP"';c.textAlign="center";
      c.fillText(`スライス中... ${Math.floor(slc.prog)}%`,W/2,H-117);
    }else{
      let sbH=G.mx>W/2-110&&G.mx<W/2+110&&G.my>H-140&&G.my<H-95;
      let sg=c.createLinearGradient(W/2-110,H-140,W/2-110,H-95);
      sg.addColorStop(0,sbH?"#1a6030":"#124820");sg.addColorStop(1,sbH?"#0e4a20":"#0a3518");
      c.fillStyle=sg;roundRect(c,W/2-110,H-140,220,45,8);c.fill();
      c.strokeStyle=sbH?"#0f0":"#0a0";c.lineWidth=2;roundRect(c,W/2-110,H-140,220,45,8);c.stroke();
      c.fillStyle="#fff";c.font='bold 18px "Noto Sans JP"';c.textAlign="center";
      c.fillText("🔪 スライス開始",W/2,H-110);

  }else{

    c.fillStyle=pg;roundRect(c,W/2-130,H-140,260,45,8);c.fill();
    c.strokeStyle=spH?"#0cf":"#068";c.lineWidth=2;roundRect(c,W/2-130,H-140,260,45,8);c.stroke();
    c.fillStyle="#fff";c.font='bold 18px "Noto Sans JP"';c.textAlign="center";
    c.fillText("🖨️ 3Dプリンターに送信",W/2,H-110);
    // Checkmark
    c.fillStyle="#0f0";c.font='14px "Noto Sans JP"';
    c.fillText("✓ スライス完了",W/2,H-82);
  }
}

// ==================== 3D PRINTER ANIMATION ====================

function drawPrint(c){
  let t=G.t;
  // Background
  c.fillStyle="#080c14";c.fillRect(0,0,W,H-INV_H);
  
  // Title
  c.fillStyle="#0cf";c.font='bold 26px "Noto Sans JP"';c.textAlign="center";
  let dots=".".repeat(Math.floor(t*.003)%4);
  c.fillText(`🖨️ 3Dプリント中${dots}`,W/2,45);
  
  // Status info
  c.fillStyle="#578";c.font='14px "Share Tech Mono"';
  c.fillText(`ノズル: 210℃ | ベッド: 60℃ | ファン: 100%`,W/2,68);
  
  // === Printer outline ===
  let px=W/2-280,py=90,pw=560,ph=420;
  
  // Printer background
  c.fillStyle="#0e1220";c.fillRect(px,py,pw,ph);
  c.strokeStyle="#2a3050";c.lineWidth=4;c.strokeRect(px,py,pw,ph);
  
  // Frame
  c.fillStyle="#2a2e40";
  c.fillRect(px+15,py+15,15,ph-30); // Left upright
  c.fillRect(px+pw-30,py+15,15,ph-30); // Right upright  
  c.fillRect(px+15,py+15,pw-30,15); // Top bar
  
  // Build plate & key height
  let buildPct=prn.layer/prn.total;
  
  // Build plate
  let bedY=py+ph-80;
  c.fillStyle="#444860";c.fillRect(px+50,bedY,pw-100,12);
  // Heated bed indicator
  c.fillStyle="rgba(255,80,0,.15)";c.fillRect(px+50,bedY+2,pw-100,8);
  // Bed clips
  c.fillStyle="#667";
  c.fillRect(px+55,bedY-3,15,5);c.fillRect(px+pw-70,bedY-3,15,5);
  
  // === 鍵をレイヤーごとに積層印刷 ===
  let keyCX=px+pw/2, keyW=280;
  let totalExtH=50; // 積層総高さ（px）
  let layersBuilt=prn.layer;
  let lh=totalExtH/prn.total; // 1レイヤーあたりの高さ
  let topOfKey=bedY-layersBuilt*lh; // 現在の鍵の一番上
  
  // Filament color for key layers
  let fci=prn.filIdx!=null?prn.filIdx:0;
  let fcMain=filColors[fci];
  let fcDark=filDark[fci];

  for(let i=0;i<layersBuilt;i++){
    let ly=bedY-(i+1)*lh;
    let alpha=.65+(i/prn.total)*.35;
    c.globalAlpha=alpha;
    c.fillStyle=fcMain;
    c.strokeStyle=fcDark;
    c.lineWidth=0.5;
    
    // キーヘッド（頭部）
    let bowX=keyCX-keyW/2, bowW=70;
    c.fillRect(bowX,ly,bowW,lh+0.5);
    c.strokeRect(bowX,ly,bowW,lh+0.5);
    // ヘッドの穴
    c.globalAlpha=1;
    c.fillStyle="#0e1220";
    c.beginPath();c.arc(bowX+bowW/2,ly+lh/2,12,0,Math.PI*2);c.fill();
    c.globalAlpha=alpha;
    c.fillStyle=fcMain;
    
    // シャフト（軸）
    let shaftX=bowX+bowW, shaftW=160, shaftTop=bedY-totalExtH*0.7;
    let shaftBot=bedY-totalExtH*0.3;
    if(ly>=shaftTop&&ly<=shaftBot){
      c.fillRect(shaftX,ly,shaftW,lh+0.5);
      c.strokeRect(shaftX,ly,shaftW,lh+0.5);
    }
    
    // キー歯（2本、下部）
    let teethTop=bedY-totalExtH*0.3;
    if(ly>=teethTop){
      c.fillRect(shaftX+60,ly,22,lh+0.5);
      c.strokeRect(shaftX+60,ly,22,lh+0.5);
      c.fillRect(shaftX+110,ly,22,lh+0.5);
      c.strokeRect(shaftX+110,ly,22,lh+0.5);
    }
  }
  c.globalAlpha=1;
  
  // 最新レイヤーの発光エフェクト
  if(prn.on&&layersBuilt>0){
    c.fillStyle="rgba(255,200,0,.4)";
    c.fillRect(keyCX-keyW/2-5,topOfKey-1,keyW+10,3);
  }
  
  // === ガントリー（ノズルの高さに連動：下から上へ） ===
  // ノズルは常に現在印刷中のレイヤーのすぐ上にいる
  let gantryY=layersBuilt>0?topOfKey-18:bedY-18;
  c.fillStyle="#3a3e55";c.fillRect(px+28,gantryY,pw-56,10);
  
  // === エクストルーダーヘッド ===
  prn.hx+=prn.dir*4;
  if(prn.hx>pw-160||prn.hx<40){prn.dir*=-1;prn.hx=Math.max(40,Math.min(pw-160,prn.hx))}
  
  let hx=px+prn.hx;
  let hy=gantryY-28;
  
  if(prn.on){
    // エクストルーダー本体
    c.fillStyle="#ff7700";
    roundRect(c,hx,hy,42,28,4);c.fill();
    // ヒートシンクフィン
    c.fillStyle="#cc5500";
    for(let f=0;f<4;f++)c.fillRect(hx+5+f*9,hy-4,7,4);
    // ノズル
    c.fillStyle="#ffaa00";
    c.beginPath();c.moveTo(hx+15,hy+28);c.lineTo(hx+27,hy+28);c.lineTo(hx+24,hy+38);c.lineTo(hx+18,hy+38);c.closePath();c.fill();
    // ノズル熱光
    let hg=c.createRadialGradient(hx+21,hy+42,0,hx+21,hy+42,20);
    hg.addColorStop(0,"rgba(255,150,0,.4)");hg.addColorStop(1,"rgba(255,100,0,0)");
    c.fillStyle=hg;c.beginPath();c.arc(hx+21,hy+42,20,0,Math.PI*2);c.fill();
    // フィラメントライン
    let filC=prn.filIdx!=null?filColors[prn.filIdx]:"#0af";
    c.strokeStyle=filC;c.lineWidth=2;
    c.beginPath();c.moveTo(hx+21,hy);c.quadraticCurveTo(hx+21,hy-30,px+pw-60,py+50);c.stroke();
  }
  
  // Filament spool on side
  {let filC=prn.filIdx!=null?filColors[prn.filIdx]:"#0af";
  let filD=prn.filIdx!=null?filDark[prn.filIdx]:"rgba(0,170,255,.3)";
  c.strokeStyle=filC;c.lineWidth=3;
  c.beginPath();c.arc(px+pw-45,py+45,22,0,Math.PI*2);c.stroke();
  c.beginPath();c.arc(px+pw-45,py+45,8,0,Math.PI*2);c.stroke();
  // Spool rotation
  let sr=t*.002;
  c.strokeStyle=filD;c.lineWidth=1;
  for(let s=0;s<4;s++){
    let sa=sr+s*Math.PI/2;
    c.beginPath();c.moveTo(px+pw-45+Math.cos(sa)*8,py+45+Math.sin(sa)*8);
    c.lineTo(px+pw-45+Math.cos(sa)*22,py+45+Math.sin(sa)*22);c.stroke();
  }}
  
  // Status LEDs
  c.fillStyle=prn.on?"rgba(0,255,0,"+(.5+Math.sin(t*.01)*.3)+")":"#0f0";
  c.beginPath();c.arc(px+30,py+50,5,0,Math.PI*2);c.fill();
  c.fillStyle="rgba(255,100,0,"+(.5+Math.sin(t*.008)*.3)+")";
  c.beginPath();c.arc(px+30,py+65,5,0,Math.PI*2);c.fill();
  
  // LCD
  c.fillStyle="#001800";roundRect(c,px+40,py+ph-40,120,30,3);c.fill();
  c.fillStyle="#0f0";c.font='bold 11px "Share Tech Mono"';c.textAlign="left";
  c.fillText(`L:${prn.layer}/${prn.total}`,px+48,py+ph-22);
  c.fillText(`${Math.floor(prn.prog)}%`,px+120,py+ph-22);
  
  // Brand
  c.fillStyle="#445";c.font='bold 12px "Share Tech Mono"';c.textAlign="center";
  c.fillText("TUKUMANA X1C",px+pw/2,py+ph+18);
  
  // === Progress bar ===
  let pbx=W/2-220,pby=H-130,pbw=440,pbh=30;
  c.fillStyle="#1a1e2a";roundRect(c,pbx,pby,pbw,pbh,6);c.fill();
  // Fill
  let pg=c.createLinearGradient(pbx,pby,pbx+pbw*prn.prog/100,pby);
  pg.addColorStop(0,"#0a4");pg.addColorStop(1,"#0f0");
  c.fillStyle=pg;roundRect(c,pbx,pby,pbw*(prn.prog/100),pbh,6);c.fill();
  c.strokeStyle="#0f0";c.lineWidth=2;roundRect(c,pbx,pby,pbw,pbh,6);c.stroke();
  // Percentage
  c.fillStyle="#fff";c.font='bold 16px "Share Tech Mono"';c.textAlign="center";
  c.fillText(`${Math.floor(prn.prog)}%`,W/2,pby+21);
  // Layer info
  c.fillStyle="#8af";c.font='14px "Noto Sans JP"';
  c.fillText(`レイヤー ${prn.layer} / ${prn.total} | 残り約${Math.max(0,Math.ceil((100-prn.prog)/100*12))}分`,W/2,pby+50);
  
  // === Update state ===
  if(prn.on&&prn.prog<100){
    prn.prog+=.4;
    prn.layer=Math.floor(prn.prog/100*prn.total);
    if(Math.random()<.08)sPrint();
    if(prn.prog>=100){
      prn.on=false;
      setTimeout(()=>{
        G.inv.push("key");G.st=ST.ROOM_R;sOk();
        msg("✓ 鍵の印刷が完了！持ち物に追加されました。鍵を選択してドアに使おう！",4000);
      },800);
    }
  }
}

function drawIntro(c){
  let t=performance.now();
  let elapsed=t-G.introT;

  // Dark background with subtle radial glow
  let bg=c.createRadialGradient(W/2,H/2,0,W/2,H/2,600);
  bg.addColorStop(0,"#0c1828");bg.addColorStop(.6,"#060e1a");bg.addColorStop(1,"#020508");
  c.fillStyle=bg;c.fillRect(0,0,W,H);

  // Floating particles
  for(let i=0;i<40;i++){
    let seed=i*6271;
    let ang=(t*.0003+seed)%(Math.PI*2);
    let rad=100+((seed*11)%350)+Math.sin(t*.0008+i)*20;
    let px=W/2+Math.cos(ang)*rad;
    let py=H/2+Math.sin(ang)*rad;
    let pa=.2+Math.sin(t*.004+i*.9)*.2;
    let ps=1+Math.sin(t*.003+i*1.1)*.8;
    c.fillStyle=`rgba(0,200,255,${pa})`;
    c.beginPath();c.arc(px,py,ps,0,Math.PI*2);c.fill();
  }

  // Title fade-in (0~800ms)
  let titleA=Math.min(1,elapsed/800);
  if(titleA>0){
    c.save();c.globalAlpha=titleA;c.textAlign="center";

    // Colorful title matching TukumanaLab logo
    c.save();
    c.font='bold 64px "Noto Sans JP"';c.textAlign="center";
    var ttl=[{t:"つ",c:"#F9EE52",g:"rgba(249,238,82,.6)"},{t:"く",c:"#589FE2",g:"rgba(88,159,226,.6)"},{t:"ま",c:"#4C964A",g:"rgba(76,150,74,.6)"},{t:"な",c:"#C9347C",g:"rgba(201,52,124,.6)"},{t:"ラボから脱出せよ！",c:"#fff",g:"rgba(255,255,255,.4)"}];
    var fullTxt="つくまなラボから脱出せよ！";
    var tw=c.measureText(fullTxt).width;
    var tx=W/2-tw/2,ty=H/2-100;
    c.textAlign="left";
    for(var ti=0;ti<ttl.length;ti++){c.shadowColor=ttl[ti].g;c.shadowBlur=30;c.fillStyle=ttl[ti].c;c.fillText(ttl[ti].t,tx,ty);tx+=c.measureText(ttl[ti].t).width;}
    c.restore();

    // Subtitle
    c.fillStyle="rgba(100,200,255,.6)";c.font='18px "Noto Sans JP"';
    c.fillText("Escape from TukumanaLab",W/2,H/2-60);

    c.restore();
  }

  // Message lines fade-in (staggered, starting at 800ms)
  let lines=["ここは...つくまなラボ？","ドアに鍵がかかっている！","ラボの機材を使って脱出しよう！"];
  c.textAlign="center";
  for(let i=0;i<lines.length;i++){
    let lineStart=800+i*400;
    let la=Math.max(0,Math.min(1,(elapsed-lineStart)/500));
    let ly=H/2-5+i*38;
    // slide up slightly as fading in
    let slideY=ly+10*(1-la);
    if(la>0){
      c.save();c.globalAlpha=la;
      c.fillStyle="#fff";c.font='24px "Noto Sans JP"';
      c.fillText(lines[i],W/2,slideY);
      c.restore();
    }
  }

  // Start button (appears after all text, ~2000ms)
  let btnA=Math.max(0,Math.min(1,(elapsed-1800)/500));
  if(btnA>0){
    c.save();c.globalAlpha=btnA;c.textAlign="center";
    let bx=W/2-100,by=H/2+120,bw=200,bh=50;
    let bHov=inR(G.mx,G.my,{x:bx,y:by,w:bw,h:bh});

    // Button glow pulse
    let pulse=.15+Math.sin(t*.004)*.05;
    c.fillStyle=bHov?`rgba(0,200,255,.3)`:`rgba(0,150,255,${pulse})`;
    roundRect(c,bx,by,bw,bh,10);c.fill();
    c.strokeStyle=bHov?"#0ef":"rgba(0,200,255,.5)";c.lineWidth=2;
    roundRect(c,bx,by,bw,bh,10);c.stroke();

    c.fillStyle=bHov?"#fff":"#0cf";c.font='bold 22px "Noto Sans JP"';
    c.fillText("スタート",W/2,by+33);
    c.restore();
  }
}

// ==================== WIN SCREEN ====================

function drawWin(c){
  let t=G.t;

  // Animated background gradient
  let bg=c.createRadialGradient(W/2,H/2,0,W/2,H/2,600);
  bg.addColorStop(0,"#0a3050");bg.addColorStop(.5,"#061a30");bg.addColorStop(1,"#020810");
  c.fillStyle=bg;c.fillRect(0,0,W,H);

  // Particle stars
  for(let i=0;i<60;i++){
    let seed=i*7919;
    let ang=(t*.0004+seed)%(Math.PI*2);
    let rad=80+((seed*13)%400)+Math.sin(t*.001+i)*.30*((seed*7)%50);
    let sx=W/2+Math.cos(ang)*rad;
    let sy=H/2+Math.sin(ang)*rad;
    let sz=1.5+Math.sin(t*.003+i*1.3)*1.2;
    let sa=.4+Math.sin(t*.005+i*.7)*.4;
    c.fillStyle=i%3===0?`rgba(255,255,100,${sa})`:`rgba(100,220,255,${sa})`;
    c.beginPath();c.arc(sx,sy,sz,0,Math.PI*2);c.fill();
  }

  // Door opening animation
  let openT=Math.min(1,(t-G.doorAnim)/2000);
  if(G.doorAnim===0)G.doorAnim=t;
  let doorW=220*Math.max(0,1-openT);
  if(openT<1){
    // Draw the door sliding open
    c.fillStyle="#3a4560";
    c.fillRect(W/2-doorW/2,H/2-120,doorW,240);
    c.strokeStyle="#5a6a7a";c.lineWidth=4;
    c.strokeRect(W/2-doorW/2,H/2-120,doorW,240);
    // Light from beyond
    let lg=c.createRadialGradient(W/2,H/2,0,W/2,H/2,300);
    lg.addColorStop(0,`rgba(255,255,200,${openT*.5})`);lg.addColorStop(1,"rgba(255,255,200,0)");
    c.fillStyle=lg;c.fillRect(0,0,W,H);
  }

  // Main text (fade in after door opens)
  let textA=Math.max(0,Math.min(1,(openT-.4)/.6));
  if(textA>0){
    c.save();c.globalAlpha=textA;c.textAlign="center";

    let bw=W-200,bh=310;
    let bTop=H/2-175;

    // Border decoration (draw first, behind text)
    c.strokeStyle="rgba(0,255,255,.3)";c.lineWidth=2;
    roundRect(c,W/2-bw/2,bTop,bw,bh,12);c.stroke();

    // Glow behind title
    c.save();c.shadowColor="rgba(0,255,255,.6)";c.shadowBlur=30;
    c.fillStyle="#0ff";c.font='bold 54px "Noto Sans JP"';
    c.fillText("脱出成功！",W/2,H/2-55);
    c.restore();

    

    // Bottom message
    c.fillStyle="#0aa";c.font='20px "Noto Sans JP"';
    c.fillText("🎉 お疲れ様でした！ 🎉",W/2,H/2+20);

    // Restart button
    let rbx=W/2-80,rby=H/2+60,rbw=160,rbh=42;
    let rbH=inR(G.mx,G.my,{x:rbx,y:rby,w:rbw,h:rbh});
    c.fillStyle=rbH?"rgba(0,200,255,.25)":"rgba(0,100,150,.15)";
    roundRect(c,rbx,rby,rbw,rbh,8);c.fill();
    c.strokeStyle=rbH?"#0cf":"rgba(0,255,255,.4)";c.lineWidth=2;
    roundRect(c,rbx,rby,rbw,rbh,8);c.stroke();
    c.fillStyle=rbH?"#fff":"#0cf";c.font='bold 18px "Noto Sans JP"';
    c.fillText("リスタート",W/2,rby+28);

    c.restore();
  }
}

// ==================== INVENTORY BAR ====================

function drawInv(c){
  // Background bar
  let ig=c.createLinearGradient(0,H-INV_H,0,H);
  ig.addColorStop(0,"#101420");ig.addColorStop(1,"#0a0e18");
  c.fillStyle=ig;c.fillRect(0,H-INV_H,W,INV_H);
  c.strokeStyle="#1a3050";c.lineWidth=2;
  c.beginPath();c.moveTo(0,H-INV_H);c.lineTo(W,H-INV_H);c.stroke();

  // Label
  c.fillStyle="#068";c.font='bold 14px "Noto Sans JP"';c.textAlign="left";
  c.fillText("🎒 持ち物",15,H-INV_H+22);

  // Empty slots
  let sx=160,sy=H-INV_H+10,sw=60,sh=60;
  for(let i=0;i<6;i++){
    let ix=sx+i*75;
    c.fillStyle="#0a1018";
    roundRect(c,ix,sy,sw,sh,6);c.fill();
    c.strokeStyle="#1a2a3a";c.lineWidth=1;
    roundRect(c,ix,sy,sw,sh,6);c.stroke();
  }

  // Items
  for(let i=0;i<G.inv.length;i++){
    let item=G.inv[i];
    let ix=sx+i*75;
    let isSel=G.sel===item;
    let isHov=G.mx>ix&&G.mx<ix+sw&&G.my>sy&&G.my<sy+sh;

    // Slot highlight
    c.fillStyle=isSel?"rgba(0,180,255,.2)":(isHov?"rgba(0,120,180,.1)":"rgba(10,20,30,.5)");
    roundRect(c,ix,sy,sw,sh,6);c.fill();
    c.strokeStyle=isSel?"#0cf":(isHov?"#08a":"#1a3050");
    c.lineWidth=isSel?2.5:1;
    roundRect(c,ix,sy,sw,sh,6);c.stroke();

    // Draw items
    if(item==="key"){
      drawKeySmall(c,ix+sw/2,sy+sh/2-3,22,prn.filIdx!=null?filColors[prn.filIdx]:null);
      c.fillStyle=isSel?"#0cf":"#89a";c.font='10px "Noto Sans JP"';c.textAlign="center";
      c.fillText("3D鍵",ix+sw/2,sy+sh-4);
    }else if(item==="power_cable"){
      // Cable body
      c.strokeStyle="#333";c.lineWidth=4;
      c.beginPath();c.moveTo(ix+15,sy+20);c.bezierCurveTo(ix+25,sy+38,ix+35,sy+18,ix+45,sy+32);c.stroke();
      // Plug head
      c.fillStyle="#444";c.fillRect(ix+8,sy+14,14,16);
      c.fillStyle="#bbb";c.fillRect(ix+10,sy+11,4,5);c.fillRect(ix+17,sy+11,4,5);
      c.fillStyle=isSel?"#0cf":"#89a";c.font='9px "Noto Sans JP"';c.textAlign="center";
      c.fillText("電源ケーブル",ix+sw/2,sy+sh-4);
    }else if(item.startsWith("fil_")){
      let fi=parseInt(item[4]);
      let fc=filColors[fi];
      c.strokeStyle=fc;c.lineWidth=3;
      c.beginPath();c.arc(ix+sw/2,sy+sh/2-5,18,0,Math.PI*2);c.stroke();
      c.strokeStyle=filDark[fi];c.lineWidth=2;
      c.beginPath();c.arc(ix+sw/2,sy+sh/2-5,7,0,Math.PI*2);c.stroke();
      c.fillStyle=isSel?"#0cf":"#89a";c.font='9px "Noto Sans JP"';c.textAlign="center";
      c.fillText(filNames[fi],ix+sw/2,sy+sh-4);
    }

    // Selection glow
    if(isSel){
      c.save();c.shadowColor="rgba(0,255,255,.5)";c.shadowBlur=12;
      c.strokeStyle="rgba(0,255,255,.4)";c.lineWidth=2;
      roundRect(c,ix-2,sy-2,sw+4,sh+4,8);c.stroke();
      c.restore();
    }
  }

  // Hint text
  if(G.inv.length===0){
    c.fillStyle="#334";c.font='13px "Noto Sans JP"';c.textAlign="center";
    c.fillText("アイテムがまだありません。部屋を調べてみよう...",W/2,H-INV_H+45);
  }else if(G.sel){
    c.fillStyle="#0af";c.font='bold 13px "Noto Sans JP"';c.textAlign="right";
    c.fillText("「3Dプリント鍵」を選択中 — ドアをクリック！",W-20,H-INV_H+22);
  }

  // State indicator
  c.fillStyle="#334";c.font='11px "Share Tech Mono"';c.textAlign="right";
  let stLabel={roomL:"CAD室",room:"ROOM",roomR:"3DP室",passcode:"PASSCODE",model:"CAD",slice:"SLICER",print:"PRINTING",filament:"FILAMENT",win:"ESCAPED"};
  c.fillText(`[${stLabel[G.st]||G.st}]`,W-15,H-8);
}

// ==================== KEY ICON ====================

function drawKeySmall(c,x,y,size,col){
  c.save();c.translate(x,y);
  let s=size/30;
  let km=col||"#ffd700";
  let ks=col?filDark[filColors.indexOf(col)]||"#888":"#b8960f";

  // Bow (head) circle
  c.fillStyle=km;
  c.beginPath();c.arc(-8*s,0,9*s,0,Math.PI*2);c.fill();
  c.strokeStyle=ks;c.lineWidth=1.5*s;c.stroke();
  // Hole
  c.fillStyle="#0a1018";
  c.beginPath();c.arc(-8*s,0,4*s,0,Math.PI*2);c.fill();

  // Shaft
  c.fillStyle=km;
  c.fillRect(-2*s,-3*s,28*s,6*s);
  c.strokeStyle=ks;c.lineWidth=1*s;
  c.strokeRect(-2*s,-3*s,28*s,6*s);

  // Teeth
  c.fillStyle=km;
  c.fillRect(12*s,3*s,4*s,6*s);
  c.fillRect(19*s,3*s,4*s,8*s);
  c.fillRect(25*s,3*s,3*s,5*s);
  c.strokeStyle=ks;c.lineWidth=.8*s;
  c.strokeRect(12*s,3*s,4*s,6*s);
  c.strokeRect(19*s,3*s,4*s,8*s);
  c.strokeRect(25*s,3*s,3*s,5*s);

  // Shine
  c.fillStyle="rgba(255,255,255,.3)";
  c.fillRect(-2*s,-3*s,28*s,2*s);

  c.restore();
}

// ==================== GAME LOOP ====================

let lastT=0;
function loop(ts){
  G.t=ts;

  draw();
  requestAnimationFrame(loop);
}

// ==================== RESPONSIVE SCALING ====================

function fitCanvas(){
  let gc=document.getElementById("gc");
  let border=6; // 3px * 2
  let vw=window.innerWidth,vh=window.innerHeight;
  let cw=W+border,ch=H+border;
  let scale=Math.min(vw/cw,vh/ch,1); // never upscale beyond 1
  if(scale<1){
    gc.style.transform=`scale(${scale})`;
    gc.style.width=W+'px';gc.style.height=H+'px';
    gc.style.margin=`${-(ch*(1-scale))/2}px ${-(cw*(1-scale))/2}px`;
  }else{
    gc.style.transform='';gc.style.width='';gc.style.height='';gc.style.margin='';
  }
  checkSize();
}

// ==================== TOUCH EVENTS ====================

let _touchId=null;
function onTouchStart(e){
  e.preventDefault();
  let t=e.changedTouches[0];_touchId=t.identifier;
  let p=toCanvas(t.clientX,t.clientY);
  G.mx=p.x;G.my=p.y;
  // Simulate mousedown
  onDown({clientX:t.clientX,clientY:t.clientY});
}
function onTouchMove(e){
  e.preventDefault();
  for(let t of e.changedTouches){
    if(t.identifier===_touchId){
      let p=toCanvas(t.clientX,t.clientY);
      G.mx=p.x;G.my=p.y;
    }
  }
}
function onTouchEnd(e){
  e.preventDefault();
  for(let t of e.changedTouches){
    if(t.identifier===_touchId){
      let p=toCanvas(t.clientX,t.clientY);
      G.mx=p.x;G.my=p.y;
      _touchId=null;
      onUp();
      // Simulate click
      onClick({clientX:t.clientX,clientY:t.clientY});
    }
  }
}

// ==================== SIZE WARNING ====================
function checkSize(){
  let cv=document.getElementById("cv");
  let warn=document.getElementById("size-warn");
  let r=cv.getBoundingClientRect();
  let shortW=r.left<-1||r.right>window.innerWidth+1;
  let shortH=r.top<-1||r.bottom>window.innerHeight+1;
  let hidden=shortW||shortH;
  // On mobile portrait, suggest landscape
  let isMobile='ontouchstart' in window;
  let isPortrait=window.innerHeight>window.innerWidth;
  let showRotate=isMobile&&isPortrait;
  warn.classList.toggle("show",hidden||showRotate);
  if(showRotate){
    warn.innerHTML='📱 <span>横向き</span>にすると遊びやすくなります。';
  }else if(hidden){
    let dir=shortW&&shortH?"横幅と高さ":shortW?"横幅":"高さ";
    warn.innerHTML='⚠ 画面の<span>'+dir+'</span>が足りないため、ゲームの一部が表示されていません。<span>ブラウザを拡大</span>するか、<span>全画面表示</span>でお楽しみください。';
  }
}
